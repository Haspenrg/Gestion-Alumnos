<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Impresión Oficial - Boletín de Calificaciones</title>
    <style>
        /* --- ESTILOS GENERALES DE PREVISUALIZACIÓN (PANTALLA) --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #334155;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra de herramientas superior fija */
        .barra-herramientas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 1000;
        }

        .titulo-modulo {
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .contenedor-controles {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Switch reactivo para el reverso */
        .switch-reverso-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #334155;
            padding: 8px 14px;
            border-radius: 6px;
            user-select: none;
        }

        .switch-reverso-panel input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0;
        }

        .switch-reverso-panel label {
            color: #f1f5f9;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Botones de acción */
        .btn-control {
            border: none;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-imprimir {
            background-color: #10b981;
            color: white;
        }

        .btn-imprimir:hover {
            background-color: #059669;
        }

        .btn-cerrar {
            background-color: #ef4444;
            color: white;
        }

        .btn-cerrar:hover {
            background-color: #dc2626;
        }

        /* Contenedor principal de hojas */
        #contenedorImpresionHojas {
            margin-top: 90px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            width: 100%;
        }

        /* --- MAXIMIZACIÓN DE LA CAJA DE RENDEREADO EN PANTALLA --- */
        .contenedor-media-hoja-pdf {
            background-color: #ffffff;
            width: 1000px; 
            height: 680px; 
            padding: 40px 60px;
            box-sizing: border-box;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            position: relative;
            background-image: url('logo1.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 35%;
            background-blend-mode: overlay;
            font-size: 14px;
        }

        /* Ajuste elástico de tablas para el nuevo tamaño de monitor */
        .contenedor-media-hoja-pdf table {
            font-size: 13px !important;
            width: 100%;
            border-collapse: collapse;
        }
        
        .contenedor-media-hoja-pdf th {
            font-size: 12px !important;
            padding: 8px 4px !important;
        }

        .contenedor-media-hoja-pdf td {
            font-size: 13px !important;
            padding: 6px 8px !important;
        }

        .contenedor-media-hoja-pdf h2 {
            font-size: 20px !important;
        }

        .contenedor-media-hoja-pdf h3 {
            font-size: 15px !important;
        }

        /* Ocultamiento inicial por clase del reverso */
        .boletin-reverso-hoja {
            display: none;
        }
   
        /* =========================================================================
   ANCLA DE BÚSQUEDA: @media screen and (max-width: 768px) {
   REEMPLAZAR LOS SELECTORES DE CONTEXTO PARA FORZAR EL DISEÑO SOBRE EL ID DINÁMICO
   ========================================================================= */
@media screen and (max-width: 768px) {
    /* Forzar el cambio sobre el contenedor dinámico de la carilla de frente */
    div[id^="carillaFrente-"], 
    .contenedor-media-hoja-pdf {
        width: 100% !important;
        max-width: 100vw !important;
        height: auto !important;
        min-height: auto !important;
        padding: 15px 10px !important;
        margin: 10px auto !important;
        box-sizing: border-box !important;
        display: block !important;
    }

    /* Desestructuración absoluta: convierte toda la tabla y sus celdas en bloques */
    div[id^="carillaFrente-"] table,
    div[id^="carillaFrente-"] thead,
    div[id^="carillaFrente-"] tbody,
    div[id^="carillaFrente-"] th,
    div[id^="carillaFrente-"] tr,
    div[id^="carillaFrente-"] td,
    .contenedor-media-hoja-pdf table,
    .contenedor-media-hoja-pdf thead,
    .contenedor-media-hoja-pdf tbody,
    .contenedor-media-hoja-pdf th,
    .contenedor-media-hoja-pdf tr,
    .contenedor-media-hoja-pdf td {
        display: block !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }

    /* Ocultar las cabeceras rígidas originales por completo */
    div[id^="carillaFrente-"] thead,
    .contenedor-media-hoja-pdf thead,
    div[id^="carillaFrente-"] th,
    .contenedor-media-hoja-pdf th {
        display: none !important;
    }



    /* Convierte cada fila de asignatura en una tarjeta independiente */
    .contenedor-media-hoja-pdf tr.fila-materia-responsiva {
        display: block !important;
        width: 100% !important;
        margin-bottom: 12px !important;
        border: 1px solid #cbd5e1 !important;
        border-radius: 6px !important;
        padding: 8px !important;
        background: #f8fafc !important;
    }

    /* Alineación clave-valor para las notas en los extremos de la pantalla */
    .contenedor-media-hoja-pdf tr.fila-materia-responsiva td {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        width: 100% !important;
        box-sizing: border-box !important;
        border: none !important;
        padding: 5px 4px !important;
        border-bottom: 1px dashed #e2e8f0 !important;
        text-align: right !important;
        font-size: 11px !important;
    }

    /* Destacado visual superior de la materia dentro de la tarjeta */
    .contenedor-media-hoja-pdf tr.fila-materia-responsiva td[data-label="Asignatura"] {
        background: #1e293b !important;
        color: #ffffff !important;
        justify-content: center !important;
        font-size: 12px !important;
        border-radius: 4px !important;
        margin-bottom: 6px !important;
        padding: 6px !important;
    }

    /* Evita que aparezca el prefijo "Asignatura:" repetido */
    .contenedor-media-hoja-pdf tr.fila-materia-responsiva td[data-label="Asignatura"]::before {
        display: none !important;
    }

    /* Inyección dinámica del nombre de la columna a la izquierda de la nota */
    .contenedor-media-hoja-pdf tr.fila-materia-responsiva td::before {
        content: attr(data-label);
        font-weight: bold !important;
        color: #475569 !important;
        float: left !important;
        text-transform: uppercase !important;
        font-size: 9px !important;
    }
}

        /* --- CONFIGURACIÓN ESTRICTA E INMUTABLE DE IMPRESIÓN FÍSICA --- */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: #ffffff !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            #contenedorImpresionHojas {
                margin: 0 !important;
                padding: 0 !important;
                gap: 0 !important;
                width: auto !important;
            }
            .contenedor-media-hoja-pdf {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always !important;
                width: 210mm !important;
                height: 148.5mm !important;
                padding: 10mm 20mm !important;
                background-size: 40% !important;
                font-size: 9px !important;
            }
            .contenedor-media-hoja-pdf table {
                font-size: 9px !important;
            }
            .contenedor-media-hoja-pdf th {
                font-size: 8px !important;
                padding: 2px !important;
            }
            .contenedor-media-hoja-pdf td {
                font-size: 10px !important;
                padding: 3px 5px !important;
            }
            .contenedor-media-hoja-pdf h2 {
                font-size: 13px !important;
            }
            .contenedor-media-hoja-pdf h3 {
                font-size: 10px !important;
            }
            .boletin-reverso-hoja[style*="display: block"] {
                display: block !important;
                page-break-after: always !important;
            }
        }
    </style>
</head>
<body>

    <!-- Barra de comandos superior excluida de la impresión física -->
    <header class="barra-herramientas no-print">
        <div class="titulo-modulo" id="indicadorCarga">
            🔄 Sincronizando matriz de datos institucionales...
        </div>
        <div class="contenedor-controles">
            <div class="switch-reverso-panel">
                <input type="checkbox" id="chkIncluirReverso">
                <label for="chkIncluirReverso">Incluir Reverso (Portada/Contraportada)</label>
            </div>
            <button class="btn-control btn-imprimir" id="btnGatillarImpresion" disabled>🖨️ Imprimir</button>
            <button class="btn-control btn-cerrar" id="btnGatillarCierre">❌ Cerrar</button>
        </div>
    </header>

    <!-- Nodo receptor donde se inyectarán las carillas generadas -->
    <main id="contenedorImpresionHojas"></main>

    <!-- Carga del subcontrolador autónomo como tipo módulo -->
    <script type="module" src="boletin.js"></script>
</body>
</html>
