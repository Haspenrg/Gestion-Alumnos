<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoción Académica - Colegio HASPEN</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            min-height: 100vh;
            background: linear-gradient(90deg, #3a6fa1 0%, #f7a45c 100%); /* fondo suave */
        }

        .panel-container {
            width: 99%;               /* ocupa el 99% del ancho */
            margin: 20px auto;        /* centrado con margen */
            padding: 20px;
            background: rgba(255,255,255,0.95); /* fondo blanco */
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        header {
            background: linear-gradient(90deg, #1b4d82 0%, #f48120 100%); /* degradado institucional */
            border-bottom: 4px solid #13365b;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="panel-container">
        <header>
            <div style="display: flex; flex-direction: column; align-items: flex-start;">
                <h2 style="color: white; font-size: 28px; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: 0.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); font-family: inherit;">
                    COLEGIO PROVINCIAL HASPEN
                </h2>
                <p style="color: rgba(255, 255, 255, 0.95); font-size: 14px; font-weight: 500; margin: 5px 0 0 0; text-align: left; font-family: inherit;">
                    Gestión de Promoción de Alumnos — Registro de avances académicos y promociones por Ciclo Lectivo
                </p>
            </div>
            <img src="logo1.png" alt="Escudo Colegio" style="height: 55px; width: auto; filter: drop-shadow(1px 1px 4px rgba(0,0,0,0.2));">
        </header>
        <!-- Aquí va el resto del contenido -->
    </div>
</body>
</html>
