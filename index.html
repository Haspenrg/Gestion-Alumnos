<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm">
            <img src="logo.jpg" alt="Logo Colegio HASPEN" class="logo-colegio">
            <h2>Gestión de Alumnos</h2>
            <h3>Colegio HASPEN</h3>
            <p>Inicie sesión para continuar</p>

            <div id="mensaje" class="mensaje-alerta"></div>

            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: admin" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-principal">Ingresar al Sistema</button>
            <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
