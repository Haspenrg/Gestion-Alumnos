<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-container">
        <!-- FORMULARIO DE LOGUEO PRINCIPAL -->
        <form id="loginForm">
            <img src="logo.jpg" alt="Logo Colegio HASPEN" class="logo-colegio">
            <h2 class="titulo-principal">Sistema de Gestión de Alumnos</h2>
            <h3>Colegio Haspen</h3>
            <p>Inicie sesión para continuar</p>

            <div id="mensaje" class="mensaje-alerta"></div>

            <div class="input-group">
                <label for="usuario">Usuario (DNI)</label>
                <input type="text" id="usuario" placeholder="Ej: 22222222" required pattern="[0-9]+" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-principal">Ingresar al Sistema</button>
            <a href="#" id="olvido-pass" class="forgot-pass">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <!-- SEPARADO: VENTANA MODAL (FUERA DEL FORMULARIO DE ACCESO) -->
    <div id="modalRecuperar" class="modal-contenedor">
        <div class="modal-contenido">
            <h3>Restablecer Contraseña</h3>
            <p>Ingrese su DNI verificado para cambiar su clave de acceso.</p>
            
            <div id="modal-mensaje" class="mensaje-alerta"></div>

            <div class="input-group">
                <label for="modal-dni">Su número de DNI</label>
                <input type="text" id="modal-dni" placeholder="Ingrese su DNI" pattern="[0-9]+" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="modal-nueva-clave">Nueva Contraseña</label>
                <input type="password" id="modal-nueva-clave" placeholder="Mínimo 4 caracteres">
            </div>

            <div class="modal-botones">
                <button type="button" id="btn-cancelar-modal" class="btn-secundario">Cancelar</button>
                <button type="button" id="btn-cambiar-modal" class="btn-principal">Cambiar Contraseña</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
