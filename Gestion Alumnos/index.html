<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="login-container">
        <form id="loginForm">
            <!-- Espacio para el logo -->
            <img src="logo.jpg" alt="Logo Colegio HASPEN" class="logo-colegio">
            
            <h2>Gestión de Alumnos</h2>
            <h3>Colegio HASPEN</h3>
            
            <p>Inicie sesión para continuar</p>
            
            <div class="input-group">
                <label for="usuario">Usuario o Email</label>
                <input type="text" id="usuario" name="usuario" placeholder="Ej: alumno123" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Ingresar al Sistema</button>
            
            <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <!-- Conectamos el archivo de lógica que usaremos después -->
    <script src="app.js"></script>

</body>
</html>
