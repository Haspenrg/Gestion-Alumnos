<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Aplicación del fondo institucional sin alterar la funcionalidad */
        body {
            background: linear-gradient(135deg, #a4c2e6 0%, #f7e6d5 50%, #fbc280 100%) !important;
        }

        /* Estilos coercitivos requeridos por directiva para módulos inhabilitados */
        .modulo-bloqueado {
            pointer-events: none !important;
            opacity: 0.4 !important;
            cursor: not-allowed !important;
            user-select: none;
        }

        /* Indicador estético visual para el estado de solo lectura */
        .modulo-solo-lectura {
            border-left: 5px solid #1a73e8 !important;
        }

        /* Control de alineación fluida para ubicar el escudo en chico a la derecha */
        .header-dashboard {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            text-align: left !important;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header-textos {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-panel-chico {
            height: 65px !important;
            width: auto !important;
            object-fit: contain;
        }
    </style>
</head>
<body>
<div class="panel-container">
     <header class="grid grid-cols-1 md:grid-cols-3 items-center gap-4 border-b border-gray-200 pb-4 mb-6" style="display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 25px;">
        <!-- Columna Izquierda: Datos del Usuario (IDs Intactos) -->
        <div class="header-textos">
            <h1 id="saludo-usuario" style="font-size: 1.5rem; font-weight: bold; margin: 0;">Sistema HASPEN</h1>
            <p id="rol-usuario" style="font-size: 0.85rem; color: #777; margin: 5px 0 0 0;">Panel de Administración Principal</p>
        </div>

            <!-- Columna Central: Título Institucional con Mayor Jerarquía Visual -->
        <div style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <h2 style="color: #1b4d82; font-size: 2.1rem; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; margin: 0; white-space: nowrap; line-height: 1;">
                COLEGIO PROVINCIAL HASPEN
            </h2>
            <p style="color: #555; font-size: 1.05rem; font-weight: 600; font-style: italic; margin: 6px 0 0 0;">
                Prof. Luis Felippa Adam
            </p>
        </div>

        <!-- Columna Derecha: Escudo Agrandado (Evitando cortes de línea) -->
        <div style="display: flex; justify-content: flex-end; align-items: center;">
            <img src="logo1.png" alt="Escudo Oficial Colegio HASPEN" style="height: 110px !important; width: auto !important; object-fit: contain;">
        </div>
    </header>


    <div class="dashboard-grid">
        <!-- 1. Gestión de Usuarios -->
        <div id="mod-usuarios" class="modulo-card">
            <span class="icon">👥</span>
            <h4>Gestión de Usuarios</h4>
        </div>
        <!-- 2. Gestión de Alumnos -->
        <div id="mod-inscripcion" class="modulo-card">
            <span class="icon">📝</span>
            <h4>Gestión de Alumnos</h4>
        </div>
        <!-- 3. Crear Cursos y Materias -->
        <div id="mod-cursos-materias" class="modulo-card">
            <span class="icon">🏫</span>
            <h4>Crear Cursos y Materias</h4>
        </div>
        <!-- 4. Calificaciones -->
        <div id="mod-calificaciones" class="modulo-card">
            <span class="icon">📊</span>
            <h4>Calificaciones</h4>
        </div>
        <!-- 5. Control de Previas -->
        <div id="mod-previas" class="modulo-card">
            <span class="icon">⚠</span>
            <h4>Control de Previas</h4>
        </div>
        <!-- 6. Estadísticas -->
        <div id="mod-estadisticas" class="modulo-card">
            <span class="icon">📈</span>
            <h4>Estadísticas</h4>
        </div>
        <!-- 7. Creación de Roles (Exclusivo Administrador) -->
        <div id="mod-roles" class="modulo-card">
            <span class="icon">🔐</span>
            <h4>Creación de Roles</h4>
        </div>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 15px; width: 100%;">
    <button id="btn-cambiar-clave-perfil" style="background-color: #4b5563; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1;">Cambiar Contraseña</button>
    <button id="btn-cerrar-sesion" class="btn-salir" style="flex: 1; margin: 0;">Cerrar Sesión</button>
</div>
</div>

<!-- SCRIPT DE CONTROL DE ROLES ADAPTADO PARA PERSONAL HÍBRIDO Y FIREBASE -->
<script>
document.addEventListener("DOMContentLoaded", async function() {
    await verificarYConfigurarPanel();
    document.getElementById('btn-cerrar-sesion').addEventListener('click', cerrarSesion);
    document.getElementById('btn-cambiar-clave-perfil').addEventListener('click', gestionarCambioClaveAutónomo);

});

async function obtenerSesionLocal() {
    try {
        const datosSesion = localStorage.getItem('usuarioActivo');
        if (!datosSesion) return null;
        return JSON.parse(datosSesion);
    } catch (error) {
        console.error("Error al leer sesión activa:", error);
        return null;
    }
}

async function obtenerPermisosRol(rolId) {
    try {
        const rolesRaw = localStorage.getItem('rolesColegio');
        if (!rolesRaw) return null;
        const roles = JSON.parse(rolesRaw);
        return roles.find(r => r.id.toLowerCase().trim() === rolId.toLowerCase().trim()) || null;
    } catch (error) {
        console.error("Error al leer matriz de roles:", error);
        return null;
    }
}

async function verificarYConfigurarPanel() {
    const usuario = await obtenerSesionLocal();
    if (!usuario) {
        window.location.href = "index.html";
        return;
    }

    const rolIdMapeado = usuario.rol.toLowerCase().trim();

    // Personalización de la interfaz institucional
    document.getElementById('saludo-usuario').textContent = `Hola, ${usuario.nombre}`;
    document.getElementById('rol-usuario').textContent = `Perfil: ${usuario.rol.toUpperCase()}`;

    // REGLA DE EXCEPCIÓN RAÍZ: El administrador tiene acceso total nativo inmediato
    if (rolIdMapeado === "administrador") {
        configurarEnlaceModulo("mod-usuarios", "usuarios.html");
        configurarEnlaceModulo("mod-inscripcion", "inscripcion.html");
        configurarEnlaceModulo("mod-cursos-materias", "cursos-materias.html");
        configurarEnlaceModulo("mod-calificaciones", "calificaciones.html");
        configurarEnlaceModulo("mod-previas", "alert('Próximamente: Control de Previas')");
        configurarEnlaceModulo("mod-estadisticas", "estadisticas.html");
        configurarEnlaceModulo("mod-roles", "roles.html");
        return;
    }

    // Bloqueo físico perimetral inmediato del módulo de roles para cualquier otro rol
    bloquearModuloFisico("mod-roles");

    // Intentar cargar permisos desde la matriz RBAC local
    let datosRolActual = await obtenerPermisosRol(rolIdMapeado);

    // SISTEMA FALLBACK SEGURO: Si no hay matriz local, inyectamos los permisos duros oficiales
    if (!datosRolActual || !datosRolActual.permisos) {
        console.warn("Matriz dinámica ausente. Activando mapeo duro por perfiles oficiales.");
        if (rolIdMapeado === "preceptor") {
            datosRolActual = {
                permisos: {
                    configuracionUsuarios: "ninguno",
                    planesEstudio: "ninguno",
                    controlPrevias: "acceso",
                    reportesEstadisticas: "acceso",
                    legajoDigital: "escritura",
                    libroCalificaciones: "lectura"
                }
            };
        } else if (rolIdMapeado === "dirección" || rolIdMapeado === "direccion" || rolIdMapeado === "directivo") {
            datosRolActual = {
                permisos: {
                    configuracionUsuarios: "ninguno",
                    planesEstudio: "ninguno",
                    controlPrevias: "lectura",
                    reportesEstadisticas: "lectura",
                    legajoDigital: "lectura",
                    libroCalificaciones: "lectura"
                }
            };
        }
    }

    // Si sigue sin haber permisos válidos, bloqueo preventivo total
    if (!datosRolActual || !datosRolActual.permisos) {
        console.error("Bloqueo preventivo de seguridad por falta de configuración de rol.");
        bloquearModuloFisico("mod-usuarios");
        bloquearModuloFisico("mod-inscripcion");
        bloquearModuloFisico("mod-cursos-materias");
        bloquearModuloFisico("mod-calificaciones");
        bloquearModuloFisico("mod-previas");
        bloquearModuloFisico("mod-estadisticas");
        return;
    }

    const permisos = datosRolActual.permisos;

    // EVALUACIÓN GENERAL DE ACCESOS DINÁMICOS
    evaluarPermisoModulo("mod-usuarios", permisos.configuracionUsuarios, "usuarios.html", "Gestión de Usuarios");
    evaluarPermisoModulo("mod-cursos-materias", permisos.planesEstudio, "cursos-materias.html", "Crear Cursos y Materias");
    evaluarPermisoModulo("mod-previas", permisos.controlPrevias, "alert('Próximamente: Control de Previas')", "Control de Previas");
    evaluarPermisoModulo("mod-estadisticas", permisos.reportesEstadisticas, "estadisticas.html", "Estadísticas");
    evaluarPermisoModulo("mod-inscripcion", permisos.legajoDigital, "inscripcion.html", "Gestión de Alumnos");

    // SOLUCIÓN HÍBRIDA: Si es preceptor pero opera como docente activo, elevamos permisos en calificaciones
    if (rolIdMapeado === "preceptor" && usuario.esProfesor) {
        evaluarPermisoModulo("mod-calificaciones", "escritura", "calificaciones.html", "Calificaciones");
    } else {
        evaluarPermisoModulo("mod-calificaciones", permisos.libroCalificaciones, "calificaciones.html", "Calificaciones");
    }
}

// --- MOTOR CENTRALIZADO DE EVALUACIÓN DE NIVELES INSTITUCIONALES ---
function evaluarPermisoModulo(idModulo, estadoPermiso, destino, nombreVisibleModulo) {
    const estado = estadoPermiso ? estadoPermiso.toLowerCase().trim() : "ninguno";
    if (estado === "escritura" || estado === "acceso") {
        configurarEnlaceModulo(idModulo, destino);
    } else if (estado === "lectura" || estado === "solo-vista-filtrado") {
        configurarModoSoloLectura(idModulo, nombreVisibleModulo, destino.startsWith("alert") ? null : destino);
    } else {
        bloquearModuloFisico(idModulo);
    }
}

function configurarEnlaceModulo(idModulo, destino) {
    const elemento = document.getElementById(idModulo);
    if (!elemento) return;
    elemento.classList.remove('modulo-bloqueado', 'modulo-solo-lectura');
    elemento.onclick = function() {
        if (destino.startsWith("alert")) {
            const mensaje = destino.match(/'([^']+)'/);
            alert(mensaje ? mensaje[1] : "Próximamente");
        } else {
            window.location.href = destino;
        }
    };
}

function bloquearModuloFisico(idModulo) {
    const elemento = document.getElementById(idModulo);
    if (!elemento) return;
    elemento.classList.add('modulo-bloqueado');
    elemento.classList.remove('modulo-solo-lectura');
    elemento.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        alert("Acceso denegado: Su rol actual no posee permisos parametrizados para ingresar a este módulo.");
        return false;
    };
}

function configurarModoSoloLectura(idModulo, nombreModulo, urlRedireccion) {
    const elemento = document.getElementById(idModulo);
    if (!elemento) return;
    elemento.classList.remove('modulo-bloqueado');
    elemento.classList.add('modulo-solo-lectura');
    elemento.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        alert(`Acceso de SOLO LECTURA a [${nombreModulo}].\nUsted operará bajo modalidad de consulta o filtrado restringido sin permisos de modificación estructural.`);
        if (urlRedireccion) {
            window.location.href = urlRedireccion;
        }
    };
}
async function gestionarCambioClaveAutónomo() {
    const usuario = await obtenerSesionLocal();
    if (!usuario || !usuario.dni) return;

    const nuevaClave = prompt("Ingrese su nueva contraseña (mínimo 4 caracteres):");
    if (nuevaClave === null) return; 
    
    const claveLimpia = nuevaClave.trim();
    if (claveLimpia.length < 4) {
        alert("Operación inválida: La contraseña debe tener al menos 4 caracteres.");
        return;
    }

    try {
        const rolesRaw = localStorage.getItem('usuariosColegio');
        if (!rolesRaw) return;
        
        let listaUsuarios = JSON.parse(rolesRaw);
        const indice = listaUsuarios.findIndex(u => String(u.dni).trim() === String(usuario.dni).trim());

        if (indice !== -1) {
            listaUsuarios[indice].clave = claveLimpia;
            localStorage.setItem('usuariosColegio', JSON.stringify(listaUsuarios));
            alert("¡Contraseña modificada con éxito!\nPor seguridad, su sesión se cerrará.");
            cerrarSesion();
        } else {
            alert("Error: No se encontró su usuario en la base de datos.");
        }
    } catch (error) {
        console.error(error);
        alert("Ocurrió un error al guardar la contraseña.");
    }
}


// Remoción matemática de sesión local
function cerrarSesion() {
    localStorage.removeItem('usuarioActivo');
    window.location.href = "index.html";
}
</script>
</body>
</html>
