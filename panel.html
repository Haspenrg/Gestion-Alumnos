<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="panel-container">
        <header class="header-dashboard">
            <h1>Sistema HASPEN</h1>
            <p>Panel de Administración Principal</p>
        </header>

        <div class="dashboard-grid">
            <!-- Gestión de Usuarios -->
            <div class="modulo-card" onclick="window.location.href='usuarios.html'">
                <span class="icon">👥</span>
                <h4>Gestión de Usuarios</h4>
            </div>
            
            <!-- Inscripción Alumnos -->
            <div class="modulo-card" onclick="alert('Próximamente: Inscripciones')">
                <span class="icon">📝</span>
                <h4>Inscripción Alumnos</h4>
            </div>
            
            <!-- Crear Cursos -->
            <div class="modulo-card" onclick="alert('Próximamente: Cursos')">
                <span class="icon">🏫</span>
                <h4>Crear Cursos</h4>
            </div>
            
            <!-- Materias -->
            <div class="modulo-card" onclick="alert('Próximamente: Materias')">
                <span class="icon">📚</span>
                <h4>Materias</h4>
            </div>

            <!-- Calificaciones y Boletín -->
            <div class="modulo-card" onclick="alert('Próximamente: Calificaciones y Boletín')">
                <span class="icon">📊</span>
                <h4>Calificaciones y Boletín</h4>
            </div>

            <!-- Control de Previas -->
            <div class="modulo-card" onclick="alert('Próximamente: Control de Previas')">
                <span class="icon">⚠️</span>
                <h4>Control de Previas</h4>
            </div>

            <!-- Estadísticas -->
            <div class="modulo-card" onclick="alert('Próximamente: Estadísticas')">
                <span class="icon">📈</span>
                <h4>Estadísticas</h4>
            </div>
        </div>

        <button class="btn-salir" onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>
</body>
</html>
