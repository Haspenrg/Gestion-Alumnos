<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="panel-container">
        <header class="header-dashboard">
            <h1 id="saludo-usuario">Sistema HASPEN</h1>
            <p id="rol-usuario">Panel de Administración Principal</p>
        </header>
        
        <div class="dashboard-grid">
            <!-- Gestión de Usuarios -->
            <div id="mod-usuarios" class="modulo-card" onclick="window.location.href='usuarios.html'">
                <span class="icon">👥</span>
                <h4>Gestión de Usuarios</h4>
            </div>
            
            <!-- Inscripción Alumnos (Corregido con redirección nativa) -->
            <div id="mod-inscripcion" class="modulo-card" onclick="window.location.href='inscripcion.html'">
                <span class="icon">📝</span>
                <h4>Inscripción Alumnos</h4>
            </div>
            
            <!-- Crear Cursos -->
            <div id="mod-cursos" class="modulo-card" onclick="alert('Próximamente: Crear Cursos')">
                <span class="icon">🏫</span>
                <h4>Crear Cursos</h4>
            </div>
            
            <!-- Materias -->
            <div id="mod-materias" class="modulo-card" onclick="alert('Próximamente: Materias')">
                <span class="icon">📚</span>
                <h4>Materias</h4>
            </div>
            
            <!-- Calificaciones y Boletín -->
            <div id="mod-calificaciones" class="modulo-card" onclick="alert('Próximamente: Calificaciones y Boletín')">
                <span class="icon">📊</span>
                <h4>Calificaciones y Boletín</h4>
            </div>
            
            <!-- Control de Previas -->
            <div id="mod-previas" class="modulo-card" onclick="alert('Próximamente: Control de Previas')">
                <span class="icon">⚠️</span>
                <h4>Control de Previas</h4>
            </div>
            
            <!-- Estadísticas -->
            <div id="mod-estadisticas" class="modulo-card" onclick="alert('Próximamente: Estadísticas')">
                <span class="icon">📈</span>
                <h4>Estadísticas</h4>
            </div>
        </div>
        
        <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <!-- SCRIPT DE CONTROL DE ROLES Y PERMISOS -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Validamos que exista un usuario logueado en el sistema
            const datosSesion = localStorage.getItem('usuarioActivo');
            if (!datosSesion) {
                window.location.href = "index.html";
                return;
            }
            const usuario = JSON.parse(datosSesion);

            // 2. Personalizamos los textos de bienvenida del encabezado
            document.getElementById('saludo-usuario').textContent = `Hola, ${usuario.nombre}`;
            document.getElementById('rol-usuario').textContent = `Perfil: ${usuario.rol}`;

            // 3. Aplicamos la lógica estricta de permisos según reglas de negocio
            const rol = usuario.rol;
            if (rol === "Coordinación") {
                // Coordinación: Accede a Calificaciones, Estadísticas y Control de Previas
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-inscripcion");
                bloquearModulo("mod-cursos");
                bloquearModulo("mod-materias");
            } else if (rol === "Prosecretario") {
                // Prosecretario: Accede única y exclusivamente a Inscripción Alumnos
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-cursos");
                bloquearModulo("mod-materias");
                bloquearModulo("mod-calificaciones");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
            } else if (rol === "Directivo") {
                // Directivo: Acceso a todo el panel principal excepto Usuarios
                bloquearModulo("mod-usuarios");
            } else if (rol === "Preceptor") {
                // Preceptor: Acceso a Inscripciones y Calificaciones en Modo LECTURA para sus cursos
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-cursos");
                bloquearModulo("mod-materias");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
                // Configuramos el comportamiento visual y operativo para sus accesos de Solo Lectura
                configurarModoSoloLectura("mod-inscripcion", "Inscripción de Alumnos", "inscripcion.html");
                configurarModoSoloLectura("mod-calificaciones", "Calificaciones y Boletín", "");
            } else if (rol === "Profesor") {
                // Profesor: Acceso exclusivo a Calificaciones. Se bloquean los otros 6 módulos.
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-inscripcion");
                bloquearModulo("mod-cursos");
                bloquearModulo("mod-materias");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
            }
        });

        // Función auxiliar para deshabilitar módulos visual y operativamente
        function bloquearModulo(idModulo) {
            const elemento = document.getElementById(idModulo);
            if (elemento) {
                elemento.style.opacity = "0.4"; // Se muestra atenuado
                elemento.style.cursor = "not-allowed"; // Cambia el cursor a denegado
                elemento.removeAttribute("onclick"); // Elimina la acción de redirección o alerta
                elemento.addEventListener("click", function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    alert("Acceso denegado: Su rol no posee permisos para ingresar a este módulo.");
                });
            }
        }

        // Función para establecer permisos de Solo Lectura limitados a los cursos asignados
        function configurarModoSoloLectura(idModulo, nombreModulo, urlRedireccion) {
            const elemento = document.getElementById(idModulo);
            if (elemento) {
                // Modificación visual sutil para indicar un permiso especial/limitado
                elemento.style.borderLeft = "5px solid #1a73e8";
                elemento.removeAttribute("onclick");
                elemento.addEventListener("click", function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    // Mensaje informativo e institucional que respeta la regla de negocio
                    alert(`Acceso de SOLO LECTURA a [${nombreModulo}].\nUsted operará únicamente sobre sus 2 cursos asignados sin permisos de modificación.`);
                    
                    // Si el módulo cuenta con una página web asignada, redirige de forma segura
                    if (urlRedireccion) {
                        window.location.href = urlRedireccion;
                    } else {
                        alert(`Próximamente: ${nombreModulo}`);
                    }
                });
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioActivo');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
