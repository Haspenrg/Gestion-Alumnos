<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="panel-container">
        <header class="header-dashboard">
            <h1 id="saludo-usuario">Sistema HASPEN</h1>
            <p id="rol-usuario">Panel de Administración Principal</p>
        </header>
        
        <div class="dashboard-grid">
            <!-- Gestión de Usuarios -->
            <div id="mod-usuarios" class="modulo-card">
                <span class="icon">👥</span>
                <h4>Gestión de Usuarios</h4>
            </div>
            <!-- Gestión de Alumnos -->
            <div id="mod-inscripcion" class="modulo-card">
                <span class="icon">📝</span>
                <h4>Gestión de Alumnos</h4>
            </div>
            <!-- Crear Cursos y Materias (Módulo Unificado) -->
            <div id="mod-cursos-materias" class="modulo-card">
                <span class="icon">🏫</span>
                <h4>Crear Cursos y Materias</h4>
            </div>
            <!-- Calificaciones y Boletín -->
            <div id="mod-calificaciones" class="modulo-card">
                <span class="icon">📊</span>
                <h4>Calificaciones y Boletín</h4>
            </div>
            <!-- Control de Previas -->
            <div id="mod-previas" class="modulo-card">
                <span class="icon">⚠️</span>
                <h4>Control de Previas</h4>
            </div>
            <!-- Estadísticas -->
            <div id="mod-estadisticas" class="modulo-card">
                <span class="icon">📈</span>
                <h4>Estadísticas</h4>
            </div>
        </div>
        <button id="btn-cerrar-sesion" class="btn-salir">Cerrar Sesión</button>
    </div>

    <!-- SCRIPT DE CONTROL DE ROLES Y PERMISOS BLINDADO -->
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await verificarYConfigurarPanel();
            document.getElementById('btn-cerrar-sesion').addEventListener('click', cerrarSesion);
        });

        async function obtenerSesionLocal() {
            const datosSesion = localStorage.getItem('usuarioActivo');
            if (!datosSesion) return null;
            return JSON.parse(datosSesion);
        }

        async function verificarYConfigurarPanel() {
            const usuario = await obtenerSesionLocal();
            
            if (!usuario) {
                window.location.href = "index.html";
                return;
            }

            // Personalización de la interfaz institucional
            document.getElementById('saludo-usuario').textContent = `Hola, ${usuario.nombre}`;
            document.getElementById('rol-usuario').textContent = `Perfil: ${usuario.rol}`;

            const rol = usuario.rol;

            // 1. Inicialización limpia de enlaces sin clonar elementos
            configurarEnlaceModulo("mod-usuarios", "usuarios.html");
            configurarEnlaceModulo("mod-inscripcion", "inscripcion.html");
            configurarEnlaceModulo("mod-cursos-materias", "cursos-materias.html"); // Enlace directo corregido
            configurarEnlaceModulo("mod-calificaciones", "alert('Próximamente: Calificaciones y Boletín')");
            configurarEnlaceModulo("mod-previas", "alert('Próximamente: Control de Previas')");
            configurarEnlaceModulo("mod-estadisticas", "alert('Próximamente: Estadísticas')");

            // 2. Aplicación estricta de la matriz de permisos sobreescribiendo bloqueos
            if (rol === "Coordinación") {
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-inscripcion");
                bloquearModulo("mod-cursos-materias");
            } 
            else if (rol === "Prosecretario") {
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-cursos-materias");
                bloquearModulo("mod-calificaciones");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
            } 
            else if (rol === "Directivo") {
                bloquearModulo("mod-usuarios");
            } 
            else if (rol === "Preceptor") {
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-cursos-materias");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
                
                configurarModoSoloLectura("mod-inscripcion", "Gestión de Alumnos", "inscripcion.html");
                configurarModoSoloLectura("mod-calificaciones", "Calificaciones y Boletín", "");
            } 
            else if (rol === "Profesor") {
                bloquearModulo("mod-usuarios");
                bloquearModulo("mod-inscripcion");
                bloquearModulo("mod-cursos-materias");
                bloquearModulo("mod-previas");
                bloquearModulo("mod-estadisticas");
            }
        }

        function configurarEnlaceModulo(idModulo, destino) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;
            
            // Asignación limpia mediante propiedad onclick directa para evitar herencias
            elemento.onclick = function() {
                if (destino.startsWith("alert")) {
                    const mensaje = destino.match(/'([^']+)'/);
                    alert(mensaje ? mensaje[1] : "Próximamente");
                } else {
                    window.location.href = destino;
                }
            };
        }

        function bloquearModulo(idModulo) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;

            elemento.style.opacity = "0.4";
            elemento.style.cursor = "not-allowed";
            
            elemento.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                alert("Acceso denegado: Su rol no posee permisos para ingresar a este módulo.");
            };
        }

        function configurarModoSoloLectura(idModulo, nombreModulo, urlRedireccion) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;

            elemento.style.borderLeft = "5px solid #1a73e8";
            elemento.style.opacity = "1";
            elemento.style.cursor = "pointer";
            
            elemento.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                alert(`Acceso de SOLO LECTURA a [${nombreModulo}].\nUsted operará únicamente sobre sus 2 cursos asignados sin permisos de modificación.`);
                
                if (urlRedireccion) {
                    window.location.href = urlRedireccion;
                } else {
                    alert(`Próximamente: ${nombreModulo}`);
                }
            };
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioActivo');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
