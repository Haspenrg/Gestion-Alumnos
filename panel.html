<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos coercitivos requeridos por directiva para módulos inhabilitados */
        .modulo-bloqueado {
            pointer-events: none !important;
            opacity: 0.4 !important;
            cursor: not-allowed !important;
            user-select: none;
        }
        /* Indicador estético visual para el estado de solo lectura */
        .modulo-solo-lectura {
            border-left: 5px solid #1a73e8 !important;
        }
    </style>
</head>
<body>
    <div class="panel-container">
        <header class="header-dashboard">
            <h1 id="saludo-usuario">Sistema HASPEN</h1>
            <p id="rol-usuario">Panel de Administración Principal</p>
        </header>

        <div class="dashboard-grid">
            <!-- 1. Gestión de Usuarios -->
            <div id="mod-usuarios" class="modulo-card">
                <span class="icon">👥</span>
                <h4>Gestión de Usuarios</h4>
            </div>

            <!-- 2. Gestión de Alumnos -->
            <div id="mod-inscripcion" class="modulo-card">
                <span class="icon">📝</span>
                <h4>Gestión de Alumnos</h4>
            </div>

            <!-- 3. Crear Cursos y Materias (Módulo Unificado) -->
            <div id="mod-cursos-materias" class="modulo-card">
                <span class="icon">🏫</span>
                <h4>Crear Cursos y Materias</h4>
            </div>

            <!-- 4. Calificaciones y Boletín -->
            <div id="mod-calificaciones" class="modulo-card">
                <span class="icon">📊</span>
                <h4>Calificaciones y Boletín</h4>
            </div>

            <!-- 5. Control de Previas (Restaurado Estrictamente) -->
            <div id="mod-previas" class="modulo-card">
                <span class="icon">⚠️</span>
                <h4>Control de Previas</h4>
            </div>

            <!-- 6. Estadísticas -->
            <div id="mod-estadisticas" class="modulo-card">
                <span class="icon">📈</span>
                <h4>Estadísticas</h4>
            </div>

            <!-- 7. Creación de Roles (Exclusivo Administrador) -->
            <div id="mod-roles" class="modulo-card">
                <span class="icon">🔐</span>
                <h4>Creación de Roles</h4>
            </div>
        </div>

        <button id="btn-cerrar-sesion" class="btn-salir">Cerrar Sesión</button>
    </div>

    <!-- SCRIPT DE CONTROL DE ROLES Y PERMISOS BLINDADO DINÁMICO -->
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            await verificarYConfigurarPanel();
            document.getElementById('btn-cerrar-sesion').addEventListener('click', cerrarSesion);
        });

        async function obtenerSesionLocal() {
            try {
                const datosSesion = localStorage.getItem('usuarioActivo');
                if (!datosSesion) return null;
                return JSON.parse(datosSesion);
            } catch (error) {
                console.error("Error al leer sesión activa:", error);
                return null;
            }
        }

        async function obtenerPermisosRol(rolId) {
            try {
                const rolesRaw = localStorage.getItem('rolesColegio');
                if (!rolesRaw) return null;
                const roles = JSON.parse(rolesRaw);
                return roles.find(r => r.id === rolId) || null;
            } catch (error) {
                console.error("Error al leer matriz de roles:", error);
                return null;
            }
        }

        async function verificarYConfigurarPanel() {
            const usuario = await obtenerSesionLocal();
            if (!usuario) {
                window.location.href = "index.html";
                return;
            }

            const rolIdMapeado = usuario.rol.toLowerCase().trim();

            // Personalización de la interfaz institucional
            document.getElementById('saludo-usuario').textContent = `Hola, ${usuario.nombre}`;
            document.getElementById('rol-usuario').textContent = `Perfil: ${usuario.rol.toUpperCase()}`;

            // REGLA DE EXCEPCIÓN RAÍZ: Si es el administrador tiene acceso total e inmediato a todo
            if (rolIdMapeado === "administrador") {
                configurarEnlaceModulo("mod-usuarios", "usuarios.html");
                configurarEnlaceModulo("mod-inscripcion", "inscripcion.html");
                configurarEnlaceModulo("mod-cursos-materias", "cursos-materias.html");
                configurarEnlaceModulo("mod-calificaciones", "alert('Próximamente: Calificaciones y Boletín')");
                configurarEnlaceModulo("mod-previas", "alert('Próximamente: Control de Previas')");
                configurarEnlaceModulo("mod-estadisticas", "alert('Próximamente: Estadísticas')");
                configurarEnlaceModulo("mod-roles", "roles.html");
                return; // Finaliza la ejecución para el administrador, evitando los bloqueos inferiores
            }

            // Bloqueo físico del módulo de roles para cualquier otro usuario diferente al administrador
            bloquearModuloFisico("mod-roles");

            // Cargar la matriz dinámica para los demás roles de la institución
            const datosRolActual = await obtenerPermisosRol(rolIdMapeado);

            if (!datosRolActual) {
                console.warn("Advertencia: No se encontraron registros de permisos para este rol. Bloqueo preventivo.");
                bloquearModuloFisico("mod-usuarios");
                bloquearModuloFisico("mod-inscripcion");
                bloquearModuloFisico("mod-cursos-materias");
                bloquearModuloFisico("mod-calificaciones");
                bloquearModuloFisico("mod-previas");
                bloquearModuloFisico("mod-estadisticas");
                return;
            }

            const permisos = datosRolActual.permisos;

            // Evaluación de permisos dinámica para roles que no son administradores
            evaluarPermisoModulo("mod-usuarios", permisos.configuracionUsuarios, "usuarios.html");
            evaluarPermisoModulo("mod-cursos-materias", permisos.planesEstudio, "cursos-materias.html");
            evaluarPermisoModulo("mod-calificaciones", permisos.libroCalificaciones, "alert('Próximamente: Calificaciones y Boletín')");
            evaluarPermisoModulo("mod-previas", permisos.asistenciaPresentismo, "alert('Próximamente: Control de Previas')");
            evaluarPermisoModulo("mod-estadisticas", permisos.reportesEstadisticas, "alert('Próximamente: Estadísticas')");

            // Tratamiento reactivo para el Legajo Digital de Alumnos
            if (permisos.legajoDigital === "solo-vista-filtrado") {
                configurarModoSoloLectura("mod-inscripcion", "Gestión de Alumnos", "inscripcion.html");
            } else {
                evaluarPermisoModulo("mod-inscripcion", permisos.legajoDigital, "inscripcion.html");
            }
        }

        function evaluarPermisoModulo(idModulo, estadoPermiso, destino) {
            if (estadoPermiso === "acceso") {
                configurarEnlaceModulo(idModulo, destino);
            } else {
                bloquearModuloFisico(idModulo);
            }
        }

        function configurarEnlaceModulo(idModulo, destino) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;
            
            elemento.classList.remove('modulo-bloqueado', 'modulo-solo-lectura');
            
            elemento.onclick = function() {
                if (destino.startsWith("alert")) {
                    const mensaje = destino.match(/'([^']+)'/);
                    alert(mensaje ? mensaje[1] : "Próximamente");
                } else {
                    window.location.href = destino;
                }
            };
        }

        function bloquearModuloFisico(idModulo) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;

            elemento.classList.add('modulo-bloqueado');
            elemento.classList.remove('modulo-solo-lectura');
            
            elemento.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                alert("Acceso denegado: Su rol actual no posee permisos parametrizados para ingresar a este módulo.");
                return false;
            };
        }

        function configurarModoSoloLectura(idModulo, nombreModulo, urlRedireccion) {
            const elemento = document.getElementById(idModulo);
            if (!elemento) return;

            elemento.classList.remove('modulo-bloqueado');
            elemento.classList.add('modulo-solo-lectura');
            
            elemento.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                alert(`Acceso de SOLO LECTURA a [${nombreModulo}].\nUsted operará únicamente sobre sus cursos asignados sin permisos de modificación estructural.`);
                if (urlRedireccion) {
                    window.location.href = urlRedireccion;
                }
            };
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioActivo');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
