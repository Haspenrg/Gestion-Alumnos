<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Colegio HASPEN</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos específicos para la grilla interna del formulario administrativo */
        .grid-formulario {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 15px;
        }
        @media (min-width: 600px) {
            .grid-formulario {
                grid-template-columns: 1fr 1fr;
            }
        }
        .form-registro-usuario {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
        }
        .badge-rol {
            background: #e0e8f5;
            color: #0056b3;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="panel-container">
        <header class="header-dashboard">
            <h1>Gestión de Usuarios</h1>
            <p>Administración de accesos y roles del sistema</p>
        </header>

        <!-- Sección 1: Formulario para registrar un nuevo usuario -->
        <div class="form-registro-usuario">
            <h3>Registrar Nuevo Usuario</h3>
            <form id="formUsuario">
                <div class="grid-formulario">
                    <div class="input-group">
                        <label for="nombreApellido">Nombre y Apellido</label>
                        <input type="text" id="nombreApellido" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="input-group">
                        <label for="dniUsuario">DNI (Será su usuario inicial)</label>
                        <input type="number" id="dniUsuario" placeholder="Ej: 35123456" required>
                    </div>
                    <div class="input-group">
                        <label for="emailUsuario">Correo Electrónico</label>
                        <input type="email" id="emailUsuario" placeholder="ejemplo@haspen.edu.ar" required>
                    </div>
                    <div class="input-group">
                        <label for="rolUsuario">Seleccionar Rol</label>
                        <select id="rolUsuario" required>
                            <option value="" disabled selected>Seleccione un rol...</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Directivo">Directivo</option>
                            <option value="Preceptor">Preceptor</option>
                            <option value="Profesor">Profesor</option>
                            <option value="Coordinación">Coordinación</option>
                            <option value="Prosecretario">Prosecretario</option>
                        </select>
                    </div>

                    <!-- Campos dinámicos para asignación de Cursos (Preceptor) -->
                    <div id="grupoCursosPreceptor" style="display: none; grid-column: 1 / -1; background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 10px;">
                        <label style="font-weight: bold; color: #0056b3; display: block; margin-bottom: 10px;">Asignación de Responsabilidad (2 Cursos)</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <!-- Primer Curso -->
                            <div>
                                <label style="font-size: 13px; margin-bottom: 3px; display:block;">Primer Curso</label>
                                <div style="display: flex; gap: 10px;">
                                    <select class="select-anio-prep" style="width: 50%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                        <option value="" disabled selected>Año...</option>
                                        <option value="1º">1º Año</option>
                                        <option value="2º">2º Año</option>
                                        <option value="3º">3º Año</option>
                                        <option value="4º">4º Año</option>
                                        <option value="5º">5º Año</option>
                                        <option value="6º">6º Año</option>
                                    </select>
                                    <select class="select-div-prep" style="width: 50%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                        <option value="" disabled selected>División...</option>
                                        <option value="A">Div. A</option>
                                        <option value="B">Div. B</option>
                                        <option value="C">Div. C</option>
                                        <option value="D">Div. D</option>
                                        <option value="E">Div. E</option>
                                        <option value="F">Div. F</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Segundo Curso -->
                            <div>
                                <label style="font-size: 13px; margin-bottom: 3px; display:block;">Segundo Curso</label>
                                <div style="display: flex; gap: 10px;">
                                    <select class="select-anio-prep" style="width: 50%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                        <option value="" disabled selected>Año...</option>
                                        <option value="1º">1º Año</option>
                                        <option value="2º">2º Año</option>
                                        <option value="3º">3º Año</option>
                                        <option value="4º">4º Año</option>
                                        <option value="5º">5º Año</option>
                                        <option value="6º">6º Año</option>
                                    </select>
                                    <select class="select-div-prep" style="width: 50%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                        <option value="" disabled selected>División...</option>
                                        <option value="A">Div. A</option>
                                        <option value="B">Div. B</option>
                                        <option value="C">Div. C</option>
                                        <option value="D">Div. D</option>
                                        <option value="E">Div. E</option>
                                        <option value="F">Div. F</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Campos dinámicos para asignación de Materia y Curso (Profesor) -->
                    <div id="grupoAsignacionProfesor" style="display: none; grid-column: 1 / -1; background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 10px;">
                        <label style="font-weight: bold; color: #0056b3; display: block; margin-bottom: 10px;">Asignación de Cátedras Múltiples</label>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; align-items: flex-end;">
                            <div>
                                <label for="anioProfesor" style="font-size: 13px; margin-bottom: 3px; display:block;">Año</label>
                                <select id="anioProfesor" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                    <option value="" disabled selected>Seleccione...</option>
                                    <option value="1º">1º Año</option>
                                    <option value="2º">2º Año</option>
                                    <option value="3º">3º Año</option>
                                    <option value="4º">4º Año</option>
                                    <option value="5º">5º Año</option>
                                    <option value="6º">6º Año</option>
                                </select>
                            </div>
                            <div>
                                <label for="divProfesor" style="font-size: 13px; margin-bottom: 3px; display:block;">División</label>
                                <select id="divProfesor" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                    <option value="" disabled selected>Seleccione...</option>
                                    <option value="A">Div. A</option>
                                    <option value="B">Div. B</option>
                                    <option value="C">Div. C</option>
                                    <option value="D">Div. D</option>
                                    <option value="E">Div. E</option>
                                    <option value="F">Div. F</option>
                                </select>
                            </div>
                            <div>
                                <label for="materiaProfesor" style="font-size: 13px; margin-bottom: 3px; display:block;">Materia Asignada</label>
                                <select id="materiaProfesor" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; height: 38px;">
                                    <option value="" disabled selected>Seleccione materia...</option>
                                    <option value="Matemáticas">Matemáticas</option>
                                    <option value="Física">Física</option>
                                </select>
                            </div>
                            <div>
                                <button type="button" id="btnAgregarCatedra" style="width: 100%; height: 38px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">+ Agregar</button>
                            </div>
                        </div>
                        <!-- Lista visual donde se acumularán las cátedras agregadas -->
                        <div id="listaCatedrasProfesor" style="margin-top: 15px; background: white; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 4px; min-height: 40px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
                            <span style="color: #94a3b8; font-size: 13px;" id="sinCatedrasMensaje">No hay cátedras asignadas aún.</span>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-principal" style="max-width: 200px; margin-top: 15px;">Guardar Usuario</button>
            </form>
        </div>

        <!-- Sección 2: Tabla con el listado de usuarios cargados -->
        <div class="tabla-usuarios-contenedor" style="margin-top: 30px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; overflow-x: auto;">
            <h3>Usuarios Registrados</h3>
            <table style="width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; min-width: 600px;">
                <thead>
                    <tr style="border-bottom: 2px solid #0056b3; color: #333;">
                        <th>Nombre y Apellido</th>
                        <th>Usuario (DNI)</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuariosBody">
                    <!-- Las filas se renderizarán dinámicamente mediante el motor JS -->
                </tbody>
            </table>
        </div>
        <button class="btn-salir" onclick="window.location.href='panel.html'" style="margin-top: 30px; background-color: #0056b3;">Volver al Panel</button>
    </div>

    <!-- Vinculación del archivo lógico de control -->
    <script src="usuarios.js"></script>
</body>
</html>
